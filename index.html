<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crypt Custodian — Interactive Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <aside id="sidebar">
    <header class="sidebar-header">
      <h1>Crypt Custodian<span class="subtitle">Interactive Map</span></h1>
    </header>

    <div class="search-row">
      <input id="search" type="search" placeholder="Rechercher un objet…" />
    </div>

    <div class="global-progress">
      <div class="progress-label">
        <span>Complétion globale</span>
        <span id="global-percent">0%</span>
      </div>
      <div class="progress-bar"><div id="global-bar" class="progress-fill"></div></div>
      <div class="progress-detail"><span id="global-count">0 / 0</span></div>
    </div>

    <div class="toolbar">
      <button id="toggle-all-on" title="Tout afficher">👁 Tout</button>
      <button id="toggle-all-off" title="Tout cacher">🚫 Rien</button>
    </div>

    <div class="toolbar">
      <button id="collect-toggle" title="Mode collecte : 1 clic = coche un objet trouvé">✓ Collecte</button>
      <button id="admin-toggle" title="Mode édition complète (nommer, déplacer, etc.)">✏️ Édition</button>
      <button id="mapper-toggle" title="Mapper les rooms du data.win sur la s_map (place les items en bulk)">🗺️ Mapper</button>
    </div>

    <div class="toolbar">
      <button id="export-btn" title="Exporter les marqueurs en JSON">⬇ Export</button>
      <button id="import-btn" title="Importer un JSON">⬆ Import</button>
      <button id="reset-btn" class="danger" title="Effacer toute la progression sauvegardée">🗑 Reset</button>
    </div>
    <input type="file" id="import-file" accept="application/json" hidden />

    <div id="admin-panel" class="admin-panel hidden">
      <p class="hint" id="admin-hint">…</p>
      <label>Catégorie courante :
        <select id="admin-category"></select>
      </label>
    </div>

    <div id="mapper-panel" class="admin-panel hidden">
      <p class="hint" id="mapper-hint">…</p>
      <input id="mapper-search" type="search" placeholder="Filtrer rooms…" style="margin:6px 0;width:100%;padding:6px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;" />
      <div id="mapper-status" style="font-size:11px;color:var(--text-dim);margin-bottom:4px;">…</div>
      <ul id="mapper-room-list" class="mapper-room-list"></ul>
      <div style="display:flex;gap:4px;margin-top:6px;">
        <button id="mapper-clear-all" class="danger" style="flex:1;background:var(--bg-elev-2);border:1px solid var(--danger);color:var(--danger);padding:5px;border-radius:4px;cursor:pointer;font-size:11px;">🗑 Reset tous les mappings</button>
      </div>
    </div>

    <h2 class="cat-header">Catégories</h2>
    <ul id="categories" class="category-list"></ul>

    <footer class="sidebar-footer">
      <small>Données sauvegardées localement (localStorage). Pense à <kbd>Export</kbd> pour ne rien perdre.</small>
    </footer>
  </aside>

  <main id="map"></main>

  <div id="toast" class="toast hidden"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="data.js"></script>
  <script src="datamine.js"></script>
  <script src="app.js"></script>
</body>
</html>
